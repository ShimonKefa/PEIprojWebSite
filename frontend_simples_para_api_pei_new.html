<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard PEI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --surface: #0e1623;
    --surface2: #162033;
    --border: #1e2d45;
    --accent: #38bdf8;
    --accent2: #0ea5e9;
    --danger: #f87171;
    --warn: #fbbf24;
    --success: #34d399;
    --text: #e2eaf4;
    --muted: #64788f;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  header .logo span { color: var(--text); }

  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ---- SIDEBAR ---- */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .nav-btn {
    width: 100%;
    padding: 11px 14px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    text-align: left;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all .18s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--surface2); color: var(--accent); }

  .nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ---- CONTENT ---- */
  .content {
    flex: 1;
    padding: 28px;
    overflow-y: auto;
  }

  .tab { display: none; animation: fadeIn .2s ease; }
  .tab.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--text);
  }

  h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin: 24px 0 12px;
  }

  /* ---- CLIENT CARDS ---- */
  .clients-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .client-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer;
    transition: all .18s;
  }

  .client-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(56,189,248,.08);
  }

  .client-card .cn { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .client-card .cm { font-size: 12px; color: var(--muted); }

  .client-card .tags { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }

  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
    background: var(--surface2);
    color: var(--muted);
  }

  .empty {
    color: var(--muted);
    font-size: 14px;
    padding: 40px 0;
    text-align: center;
  }

  /* ---- FORM ---- */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 560px;
  }

  .form-grid .full { grid-column: 1 / -1; }

  label { font-size: 12px; color: var(--muted); font-weight: 500; display: block; margin-bottom: 4px; }

  input, select {
    width: 100%;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }

  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }

  .btn-primary { background: var(--accent); color: #080c14; }
  .btn-primary:hover { background: var(--accent2); }

  .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
  .btn-danger:hover { background: rgba(248,113,113,.1); }

  .btn-sm {
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 6px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    background: rgba(248,113,113,.12);
    color: var(--danger);
    font-weight: 500;
    transition: background .15s;
  }
  .btn-sm:hover { background: rgba(248,113,113,.22); }

  /* ---- DETAIL ---- */
  .detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .detail-header .back {
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
    width: fit-content;
  }
  .detail-header .back:hover { color: var(--text); }

  .info-chips {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
  }

  .chip span { color: var(--muted); font-size: 11px; display: block; margin-bottom: 2px; }

  /* ---- LIST ITEMS ---- */
  .list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 14px;
  }

  .risk-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
  }

  .risk-HIGH  { background: rgba(248,113,113,.15); color: var(--danger); }
  .risk-MEDIUM{ background: rgba(251,191,36,.15);  color: var(--warn); }
  .risk-LOW   { background: rgba(52,211,153,.15);  color: var(--success); }

  .add-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .add-row .field { flex: 1; min-width: 160px; }
  .add-row .field-sm { width: 140px; }

  /* ---- TOAST ---- */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 18px;
    font-size: 13px;
    display: none;
    z-index: 999;
    animation: fadeIn .2s ease;
  }
  #toast.err { border-color: var(--danger); color: var(--danger); }
  #toast.ok  { border-color: var(--success); color: var(--success); }
</style>
</head>
<body>

<header>
  <div class="logo">NeroAI <span>Treinos</span></div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button class="nav-btn active" id="nav-dashboard" onclick="showTab('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Clientes
    </button>
    <button class="nav-btn" id="nav-create" onclick="showTab('create')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Novo Cliente
    </button>
    <button class="nav-btn" id="nav-workouts" onclick="showTab('workouts')" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4v16M18 4v16M2 9h4M18 9h4M2 15h4M18 15h4"/></svg>
      Treinos
    </button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- DASHBOARD -->
    <div id="tab-dashboard" class="tab active">
      <h2>Clientes</h2>
      <div id="clients" class="clients-grid">
        <div class="empty">Carregando...</div>
      </div>
    </div>

    <!-- CREATE -->
    <div id="tab-create" class="tab">
      <h2>Novo Cliente</h2>
      <div class="form-grid">
        <div class="full">
          <label>Nome</label>
          <input id="inp-name" placeholder="Nome completo">
        </div>
        <div>
          <label>CPF</label>
          <input id="inp-cpf" placeholder="000.000.000-00">
        </div>
        <div>
          <label>Data de Nascimento</label>
          <input id="inp-birth" type="date">
        </div>
        <div>
          <label>Altura (m)</label>
          <input id="inp-height" placeholder="1.75" type="number" step="0.01">
        </div>
        <div>
          <label>Peso (kg)</label>
          <input id="inp-weight" placeholder="70" type="number" step="0.1">
        </div>
        <div>
          <label>% Gordura</label>
          <input id="inp-fat" placeholder="15" type="number" step="0.1">
        </div>
        <div>
          <label>Biotipo</label>
          <select id="inp-body">
            <option value="0">Endomorfo</option>
            <option value="1">Ectomorfo</option>
            <option value="2">Mesomorfo</option>
          </select>
        </div>
        <div class="full" style="margin-top:8px">
          <button class="btn btn-primary" onclick="createClient()">Criar Cliente</button>
        </div>
      </div>
    </div>

    <!-- DETAIL -->
    <div id="tab-detail" class="tab">
      <div class="detail-header">
        <div class="back" onclick="showTab('dashboard')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Voltar
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h2 id="clientName" style="margin-bottom:0"></h2>
        <button class="btn btn-danger" onclick="deleteClient()">Deletar Cliente</button>
      </div>

      <div class="info-chips" id="clientChips"></div>

      <!-- COMORBIDADES -->
      <h3>Comorbidades</h3>
      <div id="comorbidades"></div>

      <div class="add-row">
        <div class="field">
          <label>Descrição</label>
          <input id="inp-desc" placeholder="Ex: Hipertensão">
        </div>
        <div class="field-sm">
          <label>Risco</label>
          <select id="inp-risk">
            <option value="0">HIGH</option>
            <option value="1">MEDIUM</option>
            <option value="2">LOW</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="addCom()">Adicionar</button>
      </div>

      <!-- Objetivos -->
      <h3>Objetivos</h3>
      <div id="anamneses"></div>

      <div class="add-row" style="margin-top:8px">
        <div class="field">
          <label>Objetivo</label>
          <select id="inp-obj">
            <option value="0">HIPERTROFIA</option>
            <option value="1">EMAGRECIMENTO</option>
            <option value="2">DEFINICAO_MUSCULAR</option>
            <option value="3">REPOSICAO_MACA_MAGRA</option>
            <option value="4">GANHO_VOLUME</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="addAna()">Adicionar</button>
      </div>

      <!-- TREINOS -->
      <h3>Treinos</h3>
      <div style="display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;margin-bottom:14px">
        <div class="field-sm">
          <label>Dias/semana</label>
          <input id="inp-days" type="number" min="1" max="7" value="3" style="width:80px">
        </div>
        <div class="field-sm">
          <label>Nível</label>
          <select id="inp-level">
            <option value="0">Iniciante</option>
            <option value="1">Intermediário</option>
            <option value="2">Experiente</option>
          </select>
        </div>
        <div class="field-sm">
          <label>Intensidade</label>
          <select id="inp-intensity">
            <option value="0">Baixa</option>
            <option value="1">Média</option>
            <option value="2">Alta</option>
          </select>
        </div>
        <div class="field-sm">
          <label>Foco muscular</label>
          <select id="inp-bodyparts">
            <option value="0">Pernas</option>
            <option value="1">Core</option>
            <option value="2">Inferiores</option>
            <option value="3">Superiores</option>
          </select>
        </div>
        <button class="btn btn-primary" id="btn-generate" onclick="generateWorkout()">⚡ Gerar Treino com IA</button>
        <button class="btn" style="background:var(--surface2);color:var(--text)" onclick="loadWorkouts()">↻ Ver Treinos</button>
      </div>
      <div id="workouts-list"></div>
    </div>

    <!-- ABA TREINOS (detalhes de um treino) -->
    <div id="tab-workouts" class="tab">
      <div class="back" onclick="showTab('detail'); loadWorkouts();" style="display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--muted);font-size:13px;margin-bottom:16px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Voltar ao cliente
      </div>
      <h2 id="workout-title">Treino</h2>
      <div id="workout-notes" style="color:var(--muted);font-size:13px;margin-bottom:20px"></div>
      <div id="workout-days"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
const API = "http://localhost:5124/API";
let selectedClient = null;
const RISK_LABELS = ['HIGH','MEDIUM','LOW'];
const BODY_LABELS  = ['Endomorfo','Ectomorfo','Mesomorfo'];
const OBJECTIVE_LABELS = {
  0: 'Hipertrofia',
  1: 'Emagrecimento',
  2: 'Definição Muscular',
  3: 'Reposição de Massa Magra',
  4: 'Ganho de Volume'
};

// ── Toast ──────────────────────────────────────────────────────────
function toast(msg, type='ok'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.style.display='none', 3000);
}

// ── Tabs ───────────────────────────────────────────────────────────
function showTab(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  const nav = document.getElementById('nav-' + tab);
  if(nav) nav.classList.add('active');

  // Limpa os treinos sempre que sair da aba de detalhe
  if(tab !== 'detail'){
    document.getElementById('workouts-list').innerHTML = '';
  }

  // Esconde o botão de treinos da sidebar ao voltar para dashboard ou create
  if(tab === 'dashboard' || tab === 'create'){
    document.getElementById('nav-workouts').style.display = 'none';
    selectedClient = null; // limpa o cliente selecionado também
  }
}

// ── Load Clients ───────────────────────────────────────────────────
async function loadClients(){
  try {
    const res = await fetch(`${API}/Client`);
    if(!res.ok){ toast('Erro ao carregar clientes: ' + res.status, 'err'); return []; }
    const data = await res.json();
    if(!Array.isArray(data)){ toast('Resposta inválida da API', 'err'); return []; }

    const container = document.getElementById('clients');
    container.innerHTML = '';

    if(data.length === 0){
      container.innerHTML = '<div class="empty">Nenhum cliente cadastrado.</div>';
      return data;
    }

    data.forEach(c => {
      const div = document.createElement('div');
      div.className = 'client-card';
      div.innerHTML = `
        <div class="cn">${c.name}</div>
        <div class="cm">CPF: ${c.cpf}</div>
        <div class="tags">
          <span class="tag">${BODY_LABELS[c.bodyType] ?? '-'}</span>
          <span class="tag">${c.weight ?? '-'} kg</span>
          <span class="tag">${c.fatPercentage ?? '-'}% gordura</span>
          <span class="tag">${(c.comorbities?.length ?? 0)} comorbidade(s)</span>
        </div>`;
      div.onclick = () => openClient(c);
      container.appendChild(div);
    });

    return data;
  } catch(e) {
    toast('Falha de conexão com a API', 'err');
    console.error(e);
    return [];
  }
}

// ── Open Client ────────────────────────────────────────────────────
function openClient(c){
  selectedClient = c;
  showTab('detail');

  document.getElementById('clientName').innerText = c.name;

  document.getElementById('clientChips').innerHTML = `
    <div class="chip"><span>CPF</span>${c.cpf}</div>
    <div class="chip"><span>Nascimento</span>${c.birthDate ? c.birthDate.split('T')[0] : '-'}</div>
    <div class="chip"><span>Altura</span>${c.height ?? '-'} m</div>
    <div class="chip"><span>Peso</span>${c.weight ?? '-'} kg</div>
    <div class="chip"><span>Gordura</span>${c.fatPercentage ?? '-'}%</div>
    <div class="chip"><span>Biotipo</span>${BODY_LABELS[c.bodyType] ?? '-'}</div>`;

  const com = document.getElementById('comorbidades');
  const ana = document.getElementById('anamneses');
  com.innerHTML = '';
  ana.innerHTML = '';

  if(!c.comorbities?.length){
    com.innerHTML = '<div class="empty" style="padding:12px 0">Nenhuma comorbidade.</div>';
  } else {
    c.comorbities.forEach(x => {
      const risk = RISK_LABELS[x.riskLevelEnum] ?? 'LOW';
      const d = document.createElement('div');
      d.className = 'list-item';
      d.innerHTML = `
        <span>${x.description}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="risk-badge risk-${risk}">${risk}</span>
          <button class="btn-sm" onclick="deleteCom('${x.id}')">Remover</button>
        </div>`;
      com.appendChild(d);
    });
  }

  if(!c.anamneses?.length){
    ana.innerHTML = '<div class="empty" style="padding:12px 0">Nenhum objetivo</div>';
  } else {
    c.anamneses.forEach(x => {
      const d = document.createElement('div');
      d.className = 'list-item';
      d.innerHTML = `
      <span>${OBJECTIVE_LABELS[x.objectiveTypeEnum] ?? x.objectiveTypeEnum}</span>
      <button class="btn-sm" onclick="deleteAna('${x.id}')">Remover</button>`;
      ana.appendChild(d);
    });
  }
}

// ── Create Client ──────────────────────────────────────────────────
async function createClient(){
  const data = {
    name:           document.getElementById('inp-name').value.trim(),
    cpf:            document.getElementById('inp-cpf').value.trim(),
    birthDate:      document.getElementById('inp-birth').value,
    height:         parseFloat(document.getElementById('inp-height').value),
    weight:         parseFloat(document.getElementById('inp-weight').value),
    fatPercentage:  parseFloat(document.getElementById('inp-fat').value),
    bodyType:       parseInt(document.getElementById('inp-body').value)
  };

  if(!data.name || !data.cpf){
    toast('Preencha pelo menos nome e CPF.', 'err');
    return;
  }

  try {
    const res = await fetch(`${API}/Client`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    if(!res.ok){
      const err = await res.text();
      console.error('Erro criar cliente:', err);
      toast('Erro ao criar cliente: ' + res.status, 'err');
      return;
    }

    toast('Cliente criado com sucesso!');
    await loadClients();
    showTab('dashboard');
  } catch(e) {
    toast('Falha de conexão com a API', 'err');
    console.error(e);
  }
}

// ── Delete Client ──────────────────────────────────────────────────
async function deleteClient(){
  if(!selectedClient) return;
  if(!confirm(`Deletar "${selectedClient.name}"?`)) return;

  try {
    const res = await fetch(`${API}/Client/${selectedClient.id}/DeleteClient`, { method: 'DELETE' });
    if(!res.ok){ toast('Erro ao deletar cliente', 'err'); return; }
    toast('Cliente removido.');
    selectedClient = null;
    await loadClients();
    showTab('dashboard');
  } catch(e) {
    toast('Falha de conexão com a API', 'err');
  }
}

// ── Add Comorbity ──────────────────────────────────────────────────
async function addCom(){
  const desc = document.getElementById('inp-desc').value.trim();
  if(!desc){ toast('Preencha a descrição.', 'err'); return; }

  const body = {
    clientID: selectedClient.id,
    client: {
      id:            selectedClient.id,
      name:          selectedClient.name,
      cpf:           selectedClient.cpf,
      birthDate:     selectedClient.birthDate,
      height:        selectedClient.height,
      weight:        selectedClient.weight,
      fatPercentage: selectedClient.fatPercentage,
      bodyType:      selectedClient.bodyType,
      comorbities:   [],
      anamneses:     []
    },
    description:   desc,
    riskLevelEnum: parseInt(document.getElementById('inp-risk').value)
  };

  try {
    const res = await fetch(`${API}/Comorbity`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if(!res.ok){
      const err = await res.text();
      console.error('Erro comorbidade:', err);
      toast('Erro ao adicionar comorbidade: ' + res.status, 'err');
      return;
    }

    document.getElementById('inp-desc').value = '';
    toast('Comorbidade adicionada.');

// ── Add Anamnese ───────────────────────────────────────────────────
async function addAna(){
  const obj = document.getElementById('inp-obj').value.trim();
  if(!obj){ toast('Preencha o objetivo.', 'err'); return; }

  const body = {
    clientID: selectedClient.id,
    client: {
      id:            selectedClient.id,
      name:          selectedClient.name,
      cpf:           selectedClient.cpf,
      birthDate:     selectedClient.birthDate,
      height:        selectedClient.height,
      weight:        selectedClient.weight,
      fatPercentage: selectedClient.fatPercentage,
      bodyType:      selectedClient.bodyType,
      comorbities:   [],
      anamneses:     []
    },
    objectiveTypeEnum: parseInt(obj) || 0
  };

  try {
    const res = await fetch(`${API}/Anamnese`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if(!res.ok){
      const err = await res.text();
      console.error('Erro anamnese:', err);
      toast('Erro ao adicionar anamnese: ' + res.status, 'err');
      return;
    }

    document.getElementById('inp-obj').value = '';
    toast('Anamnese adicionada.');
    const list = await loadClients();
    const updated = list.find(c => c.id === selectedClient.id);
    if(updated) openClient(updated);
  } catch(e) {
    toast('Falha de conexão com a API', 'err');
    console.error(e);
  }
}

// ── Generate WorkOut ───────────────────────────────────────────────
async function generateWorkout(){
  if(!selectedClient){ toast('Nenhum cliente selecionado.', 'err'); return; }

  const daysPerWeek = parseInt(document.getElementById('inp-days').value);
  const experienceLevel = parseInt(document.getElementById('inp-level').value);
  const intencityWorkOut = parseInt(document.getElementById('inp-intensity').value);
  const bodyParts = parseInt(document.getElementById('inp-bodyparts').value);

  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  btn.textContent = '⏳ Gerando...';

  const body = {
    experienceLevel,
    intencityWorkOut,
    generalNotes: '',
    daysPerWeek,
    days: [{ bodyParts, dayLabel: 'Dia A', excercices: [] }],
    clients: []
  };

  try {
    const res = await fetch(`${API}/WorkOut/generate-workout/${selectedClient.id}/${daysPerWeek}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if(!res.ok){
      const err = await res.text();
      console.error('Erro gerar treino:', err);
      toast('Erro ao gerar treino: ' + res.status, 'err');
      return;
    }

    toast('Treino gerado com sucesso!');
    await loadWorkouts();
  } catch(e) {
    toast('Falha de conexão com a API', 'err');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ Gerar Treino com IA';
  }
}

// ── Load WorkOuts ──────────────────────────────────────────────────
async function loadWorkouts(){
  if(!selectedClient) return;

  const container = document.getElementById('workouts-list');
  container.innerHTML = '<div class="empty">Carregando treinos...</div>';

  try {
    const res = await fetch(`${API}/WorkOut/workouts/${selectedClient.id}`);

    if(res.status === 404){
      container.innerHTML = '<div class="empty">Nenhum treino gerado ainda.</div>';
      return;
    }

    if(!res.ok){ toast('Erro ao carregar treinos: ' + res.status, 'err'); return; }

    const workouts = await res.json();
    container.innerHTML = '';

    const LEVEL_LABELS  = ['Iniciante','Intermediário','Experiente'];
    const INTENS_LABELS = ['Baixa','Média','Alta'];

    workouts.forEach(w => {
      const d = document.createElement('div');
      d.className = 'list-item';
      d.style.flexDirection = 'column';
      d.style.alignItems = 'flex-start';
      d.style.gap = '8px';
      d.innerHTML = `
        <div style="display:flex;justify-content:space-between;width:100%;align-items:center">
          <div>
            <strong>${w.daysPerWeek} dias/semana</strong>
            <span class="tag" style="margin-left:8px">${LEVEL_LABELS[w.experienceLevel] ?? '-'}</span>
            <span class="tag" style="margin-left:4px">Intensidade ${INTENS_LABELS[w.intencityWorkOut] ?? '-'}</span>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn-sm" style="background:rgba(56,189,248,.12);color:var(--accent)" onclick="openWorkout(${JSON.stringify(w).replace(/"/g,'&quot;')})">Ver</button>
            <button class="btn-sm" onclick="deleteWorkout('${w.id}')">Remover</button>
          </div>
        </div>
        ${w.generalNotes ? `<div style="font-size:12px;color:var(--muted)">${w.generalNotes}</div>` : ''}
      `;
      container.appendChild(d);
    });
  } catch(e) {
    toast('Falha de conexão com a API', 'err');
    console.error(e);
  }
}

// ── Open WorkOut detail ────────────────────────────────────────────
function openWorkout(w){
  const LEVEL_LABELS  = ['Iniciante','Intermediário','Experiente'];
  const INTENS_LABELS = ['Baixa','Média','Alta'];

  document.getElementById('workout-title').innerText =
    `Treino — ${w.daysPerWeek} dias/sem · ${LEVEL_LABELS[w.experienceLevel]} · Intensidade ${INTENS_LABELS[w.intencityWorkOut]}`;

  document.getElementById('workout-notes').innerText = w.generalNotes ?? '';

  const daysEl = document.getElementById('workout-days');
  daysEl.innerHTML = '';

  (w.days ?? []).forEach(day => {
    const section = document.createElement('div');
    section.style.marginBottom = '20px';
    section.innerHTML = `<h3 style="margin-bottom:10px">${day.dayLabel} — ${day.focus ?? ''}</h3>`;

    (day.excercices ?? []).forEach(ex => {
      const row = document.createElement('div');
      row.className = 'list-item';
      row.style.flexDirection = 'column';
      row.style.alignItems = 'flex-start';
      row.style.gap = '4px';
      row.innerHTML = `
        <strong>${ex.name}</strong>
        <div style="font-size:12px;color:var(--muted)">
          ${ex.muscleGroup} · ${ex.sets} séries · ${ex.reps} reps · ${ex.restTime}s descanso
        </div>
        ${ex.notes ? `<div style="font-size:12px;color:var(--warn)">${ex.notes}</div>` : ''}
      `;
      section.appendChild(row);
    });

    daysEl.appendChild(section);
  });

  document.getElementById('nav-workouts').style.display = 'flex';
  showTab('workouts');
}

// ── Delete WorkOut ─────────────────────────────────────────────────
async function deleteWorkout(id){
  if(!confirm('Remover este treino?')) return;
  try {
    const res = await fetch(`${API}/WorkOut/workouts/${id}`, { method: 'DELETE' });
    if(!res.ok){ toast('Erro ao remover treino', 'err'); return; }
    toast('Treino removido.');
    await loadWorkouts();
  } catch(e) {
    toast('Falha de conexão com a API', 'err');
  }
}

// ── Init ───────────────────────────────────────────────────────────
window.onload = loadClients;
</script>
